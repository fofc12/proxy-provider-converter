custom_proxy_group=🤖 ChatGPT`select`[]♻️ ChatGPT_AI优选`^(❸gR\.TW桃园\|荐\|NF\|D\+\|AI x0\.1|⑥V2\.TW彰化\|NF\|D\+\|AI x1|❸gR\.TW宝岛\|荐\|NF\|D\+\|AI x1|❸gR\.TW台北\|荐\|NF\|D\+\|AI x1|⑥V2\.TW剑魂\|NF\|D\+\|AI x1|❸gR\.US川谱\|v6\|NF\*\|D\+\|AI x1|⑥gR\.US无量 \[下载专用\]\|NF\*\|AI x0)$`[]DIRECT

ruleset=🤖 ChatGPT,[]DOMAIN-SUFFIX,openai.com
ruleset=🤖 ChatGPT,[]DOMAIN-SUFFIX,chatgpt.com
