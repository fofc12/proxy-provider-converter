[custom]
; ChatGPT / OpenAI dedicated Subconverter external config
; Repository: fofc12/proxy-provider-converter
; Usage: set this Raw URL as the `config=` parameter of /sub.

; Generate rules from this external config and replace the default rules.
enable_rule_generator=true
overwrite_original_rules=true

